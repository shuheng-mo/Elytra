# Elytra Data Source Configuration
#
# Each entry under `datasources` is instantiated by ConnectorFactory at app
# startup and registered with ConnectorRegistry. New engines plug in by adding
# a block here — no code changes needed.
#
# `default_source` is used when /api/query is called without an explicit
# `source` field.
#
# YAML supports `${VAR:-default}` env-var expansion (handled by registry.py).

default_source: ecommerce_pg

datasources:
  # ---------------------------------------------------------------------------
  # Phase 1 legacy: PostgreSQL with the simulated e-commerce warehouse
  # (ODS / DWD / DWS layers). Reuses the existing data_dictionary.yaml as its
  # schema overlay so the rich Chinese metadata is preserved end-to-end.
  # ---------------------------------------------------------------------------
  - name: ecommerce_pg
    dialect: postgresql
    description: "电商模拟数仓 (PostgreSQL, 三层模型 ODS/DWD/DWS)"
    connection:
      host: ${DB_HOST:-localhost}
      port: ${DB_PORT:-5432}
      database: ${DB_NAME:-Elytra}
      user: ${DB_USER:-Elytra}
      password: ${DB_PASSWORD:-Elytra_dev}
    options:
      schema: public
      timeout_seconds: 30
      max_connections: 5
    overlay: db/data_dictionary.yaml

  # ---------------------------------------------------------------------------
  # DuckDB + TPC-H standard test dataset (SF=0.1, ~750k rows total).
  # Generated by `python datasets/tpch/load_tpch.py` — zero external download.
  # ---------------------------------------------------------------------------
  - name: tpch_duckdb
    dialect: duckdb
    description: "TPC-H 标准测试数据集 (DuckDB, SF=0.1)"
    connection:
      database_path: ./datasets/tpch/tpch.duckdb
    options:
      timeout_seconds: 30
      read_only: true
    overlay: config/overlays/tpch_duckdb.yaml

  # ---------------------------------------------------------------------------
  # DuckDB + Brazilian E-Commerce real dataset (Kaggle, ~100k orders).
  # Requires manual CSV download — see datasets/brazilian_ecommerce/README.md.
  # ---------------------------------------------------------------------------
  - name: brazilian_ecommerce
    dialect: duckdb
    description: "Brazilian E-Commerce (Kaggle 真实数据集, 100K+ 订单)"
    connection:
      database_path: ./datasets/brazilian_ecommerce/brazilian.duckdb
    options:
      timeout_seconds: 30
      read_only: true
    overlay: config/overlays/brazilian_ecommerce.yaml

  # ---------------------------------------------------------------------------
  # StarRocks (optional) — high-performance OLAP, MySQL-compatible protocol.
  # Bring up via `docker compose -f docker/starrocks/docker-compose.starrocks.yml up -d`
  # before enabling. Disable by commenting out the entry; the rest of the
  # registry will still come up.
  # ---------------------------------------------------------------------------
  - name: ecommerce_starrocks
    dialect: starrocks
    description: "电商数仓 (StarRocks OLAP 引擎, MySQL 协议)"
    connection:
      host: ${STARROCKS_HOST:-localhost}
      port: ${STARROCKS_PORT:-9030}
      database: ${STARROCKS_DB:-elytra}
      user: ${STARROCKS_USER:-root}
      password: ${STARROCKS_PASSWORD:-}
    options:
      timeout_seconds: 30
    overlay: config/overlays/ecommerce_starrocks.yaml
